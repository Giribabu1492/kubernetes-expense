apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: expense
  labels:
    app: frontend
    tier: frontend
    purpose: expense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      tier: frontend
      purpose: expense
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
        purpose: expense
    spec:
      containers:
      - name: nginx
        image: giri1492/frontend:1.0.0
        ports:
        - containerPort: 8080   # ✅ FIXED

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: expense
spec:
  type: LoadBalancer
  selector:
    app: frontend
    tier: frontend   # ✅ FIXED
    purpose: expense
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080